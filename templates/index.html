<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Smart ERP | Command Center</title>
    <style>
        body { background: linear-gradient(rgba(10, 15, 25, 0.85), rgba(10, 15, 25, 0.85)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-attachment: fixed; color: #fff; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .header-menu { background: #000; padding: 15px; border-bottom: 2px solid #ff9900; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: #ff9900; margin-left: 20px; text-decoration: none; font-weight: bold; }
        .panel { background: rgba(0, 0, 0, 0.7); border-left: 5px solid #ff9900; padding: 25px; margin-bottom: 20px; }
        input, select { background: #000; border: 1px solid #ff9900; color: #ff9900; padding: 10px; }
        button { background: #ff9900; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: #000; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.6); }
        th { background: #ff9900; color: #000; padding: 15px; }
        td { border: 1px solid #444; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: auto;">
        <div class="header-menu">
            <div><h2 style="color:#ff9900; margin:0;">SYSTEM: Smart ERP</h2></div>
            <div class="nav-links">
                <a href="/">الرئيسية</a>
                <a href="/backups">مركز النسخ</a>
                <a href="/logout">تسجيل خروج</a>
            </div>
        </div>
        <div class="panel">
            <form action="/add" method="POST" style="display: flex; gap: 10px;">
                <input type="text" name="name" placeholder="اسم المنتج" required>
                <input type="number" step="0.01" name="price" placeholder="السعر" required>
                <select name="category"><option>مخزن</option><option>مكتب</option><option>إلكترونيات</option></select>
                <button type="submit">إضافة</button>
            </form>
        </div>
        <table>
            <thead><tr><th>المنتج</th><th>الفئة</th><th>السعر</th><th>-</th></tr></thead>
            <tbody>
                {% for p in products %}
                <tr><td>{{ p.name }}</td><td>{{ p.category }}</td><td>{{ p.price }} $</td>
                <td><a href="/delete/{{ p.id }}" style="color: red; text-decoration:none;">حذف</a></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
