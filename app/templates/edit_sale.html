{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-[#161b22] p-8 rounded-xl border border-gray-700">
    <h2 class="text-2xl font-bold mb-6 text-[#00ffcc]">تعديل المبيعة</h2>
    
    <form action="{{ url_for('edit_sale', id=sale.id) }}" method="POST">
        <div class="mb-4">
            <label class="block text-gray-400 mb-2">اسم المنتج</label>
            <input type="text" name="product" value="{{ sale.product_name }}" required 
                   class="w-full bg-[#0d1117] p-3 rounded-lg border border-gray-600 text-white outline-none focus:border-[#00ffcc]">
        </div>
        
        <div class="mb-6">
            <label class="block text-gray-400 mb-2">السعر</label>
            <input type="number" step="0.01" name="price" value="{{ sale.price }}" required 
                   class="w-full bg-[#0d1117] p-3 rounded-lg border border-gray-600 text-white outline-none focus:border-[#00ffcc]">
        </div>
        
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-[#00ffcc] text-black font-bold py-3 rounded-lg hover:bg-[#00ccaa] transition">حفظ التغييرات</button>
            <a href="{{ url_for('sales') }}" class="flex-1 text-center bg-gray-700 text-white py-3 rounded-lg hover:bg-gray-600 transition">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
