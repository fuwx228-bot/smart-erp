{% extends 'base.html' %}
{% block content %}
<div class="p-6">
    <h1 class="text-2xl font-bold text-white mb-8">لوحة التحكم الرئيسية</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div class="bg-[#161b22] border border-[#30363d] p-6 rounded-2xl shadow-lg hover:border-[#00ffcc] transition">
            <h3 class="text-[#00ffcc] font-bold text-lg mb-2">إجمالي المبيعات</h3>
            <p class="text-white text-4xl font-mono tracking-tight">12,450 $</p>
            <p class="text-gray-400 mt-2 text-sm">بزيادة 15% عن الشهر الماضي</p>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] p-6 rounded-2xl shadow-lg hover:border-[#00ffcc] transition">
            <h3 class="text-[#00ffcc] font-bold text-lg mb-2">عناصر المخزون</h3>
            <p class="text-white text-4xl font-mono tracking-tight">8,700</p>
            <p class="text-gray-400 mt-2 text-sm">12 منتجاً منخفض المخزون</p>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] p-6 rounded-2xl shadow-lg hover:border-[#00ffcc] transition">
            <h3 class="text-[#00ffcc] font-bold text-lg mb-2">الشكاوى المفتوحة</h3>
            <p class="text-white text-4xl font-mono tracking-tight">5</p>
            <p class="text-gray-400 mt-2 text-sm">تم حل شكويين اليوم</p>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] p-8 rounded-2xl shadow-lg col-span-1 md:col-span-2 lg:col-span-3 h-80 flex items-center justify-center text-gray-500">
            [منطقة الرسم البياني المالي]
        </div>

    </div>
</div>
{% endblock %}
