<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <div class="flex h-screen">
        <aside class="w-64 bg-[#161b22] p-6 border-l border-gray-700">
            <h2 class="text-xl font-bold mb-10 text-[#00ffcc]">لوحة التحكم</h2>
            
            <nav class="space-y-4">
                <a href="{{ url_for('dashboard') }}" class="block p-3 rounded-lg hover:bg-[#00ffcc] hover:text-black transition">📊 لوحة التحكم</a>
                <a href="{{ url_for('sales') }}" class="block p-3 rounded-lg hover:bg-[#00ffcc] hover:text-black transition">🛒 المبيعات</a>
                
                <a href="{{ url_for('complaints') }}" class="block p-3 rounded-lg hover:bg-[#00ffcc] hover:text-black transition">💬 مركز الشكاوى</a>
                
                <a href="{{ url_for('settings') }}" class="block p-3 rounded-lg hover:bg-[#00ffcc] hover:text-black transition">⚙️ الإعدادات</a>
            </nav>

            <div class="mt-auto pt-10">
                <a href="{{ url_for('logout') }}" class="block text-red-400 hover:text-red-300">🚪 تسجيل الخروج</a>
            </div>
        </aside>

        <main class="flex-1 p-8">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="bg-green-600 p-4 rounded-lg mb-6">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
