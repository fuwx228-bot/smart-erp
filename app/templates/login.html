<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - نظام الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] flex items-center justify-center h-screen">

    <div class="w-full max-w-md p-8 bg-[#161b22] rounded-2xl shadow-2xl border border-gray-700">
        <h2 class="text-3xl font-bold text-center text-[#00ffcc] mb-8">نظام الإدارة</h2>
        
        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-gray-400 mb-2">اسم المستخدم</label>
                <input type="text" name="username" required 
                       class="w-full bg-[#0d1117] text-white p-4 rounded-xl border border-gray-600 focus:border-[#00ffcc] outline-none transition">
            </div>

            <div>
                <label class="block text-gray-400 mb-2">كلمة المرور</label>
                <input type="password" name="password" required 
                       class="w-full bg-[#0d1117] text-white p-4 rounded-xl border border-gray-600 focus:border-[#00ffcc] outline-none transition">
            </div>

            <button type="submit" 
                    class="w-full bg-[#00ffcc] text-black font-bold py-4 rounded-xl hover:bg-[#00ccaa] transition transform hover:scale-[1.02]">
                تسجيل الدخول
            </button>
        </form>
    </div>

</body>
</html>
